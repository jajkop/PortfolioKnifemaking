services:
  postgres:
    image: postgres:16-alpine
    container_name: nozestrona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nozestrona
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nozestrona"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nozestrona-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=nozestrona;Username=postgres;Password=admin
      Jwt__Key: SuperSecretDevelopmentKey_ChangeMeInProduction_1234567890
      Admin__Username: admin
      Admin__Password: Admin123!
      FileStorage__UploadPath: /app/uploads
      Cors__Origins__0: http://localhost
      Cors__Origins__1: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nozestrona-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
